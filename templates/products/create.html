{% extends "base.html" %}

{% block title %}Crear Producto{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-plus-circle"></i> Nuevo Producto</h1>
    <p>Registrar un nuevo producto en el sistema MiniMarket QuickStore.</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card system-card">
            <div class="card-header bg-primary text-white">
                <h5><i class="fas fa-box"></i> Datos del producto</h5>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del producto *</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            required
                            placeholder="Ej: Arroz 5kg"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Precio de venta *</label>
                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            class="form-control"
                            id="price"
                            name="price"
                            required
                            placeholder="Ej: 25.50"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="stock" class="form-label">Stock mínimo *</label>
                        <input
                            type="number"
                            min="0"
                            class="form-control"
                            id="stock"
                            name="stock"
                            required
                            placeholder="Ej: 10"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar
                    </button>

                    <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}

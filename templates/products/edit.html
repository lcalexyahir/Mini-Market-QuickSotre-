{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-edit"></i> Editar Producto</h1>
    <p>Modificar los datos del producto seleccionado.</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card system-card">
            <div class="card-header bg-warning">
                <h5><i class="fas fa-box-open"></i> Producto: {{ product.nombre }}</h5>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del producto *</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ product.nombre }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="price" class="form-label">Precio de venta *</label>
                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            class="form-control"
                            id="price"
                            name="price"
                            value="{{ product.precio_venta }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="stock" class="form-label">Stock mínimo *</label>
                        <input
                            type="number"
                            min="0"
                            class="form-control"
                            id="stock"
                            name="stock"
                            value="{{ product.stock_minimo }}"
                            required
                        >
                    </div>

                    <div class="mb-3 form-check">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="estado"
                            name="estado"
                            {% if product.estado %}checked{% endif %}
                        >

                        <label class="form-check-label" for="estado">
                            Producto activo
                        </label>
                    </div>

                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Actualizar
                    </button>

                    <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow login-card">

            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-lock"></i> Cambiar Contraseña</h4>
            </div>

            <div class="card-body">

                <p class="text-muted text-center">
                    Ingresa el código recibido por el administrador y escribe la nueva contraseña.
                </p>

                <form method="POST">

                    <div class="mb-3">
                        <label for="codigo" class="form-label">
                            <i class="fas fa-user"></i> Código de Usuario
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="codigo"
                            name="codigo"
                            required
                            placeholder="Ej: ADM-001"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="recovery_code" class="form-label">
                            <i class="fas fa-shield-alt"></i> Código de Verificación
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="recovery_code"
                            name="recovery_code"
                            required
                            placeholder="Código de 6 dígitos"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="form-label">
                            <i class="fas fa-lock"></i> Nueva Contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="new_password"
                            name="new_password"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">
                            <i class="fas fa-lock"></i> Confirmar Contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            id="confirm_password"
                            name="confirm_password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save"></i> Cambiar Contraseña
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}">
                        <i class="fas fa-arrow-left"></i> Volver al login
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}

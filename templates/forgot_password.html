{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow login-card">

            <div class="card-header bg-warning text-dark text-center">
                <h4><i class="fas fa-key"></i> Recuperar Contraseña</h4>
            </div>

            <div class="card-body">

                <p class="text-muted text-center">
                    Ingresa el código del usuario. El sistema enviará un código temporal al correo del administrador.
                </p>

                <form method="POST">

                    <div class="mb-3">
                        <label for="codigo" class="form-label">
                            <i class="fas fa-user"></i> Código de Usuario
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="codigo"
                            name="codigo"
                            required
                            placeholder="Ej: ADM-001 o CAJ-001"
                        >
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        <i class="fas fa-paper-plane"></i> Enviar código al administrador
                    </button>

                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}">
                        <i class="fas fa-arrow-left"></i> Volver al login
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}

{% extends "base.html" %}

{% block title %}Abrir Caja{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-lock-open"></i> Abrir Caja</h1>
    <p>Registra el monto inicial para comenzar la jornada de ventas.</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card system-card">
            <div class="card-header bg-primary text-white">
                <h5><i class="fas fa-cash-register"></i> Datos de apertura</h5>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="alert alert-info">
                        <strong>Nota:</strong> Solo puedes tener una caja abierta a la vez.
                    </div>

                    <div class="mb-3">
                        <label for="monto_inicial" class="form-label">
                            Monto inicial en efectivo *
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            min="0"
                            class="form-control"
                            id="monto_inicial"
                            name="monto_inicial"
                            required
                            placeholder="Ej: 100.00"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="observacion_apertura" class="form-label">
                            Observación de apertura
                        </label>

                        <textarea
                            class="form-control"
                            id="observacion_apertura"
                            name="observacion_apertura"
                            rows="3"
                            placeholder="Ej: Caja abierta para turno de la mañana"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-lock-open"></i> Abrir Caja
                    </button>

                    <a href="{{ url_for('cash.list_cash') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
